name: Build binary

on:
  push:
    branches: ["master"]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
          - os: windows-latest
          - os: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - run: rustup update
      - name: Setup VS (Windows)
        uses: microsoft/setup-msbuild@v1.1
        if: matrix.os == 'windows-latest'
      - name: Build
        run: cargo build --release --verbose
      - name: Rename binary for release (Linux)
        if: runner.os == 'Linux'
        run: mv target/release/hachip_console target/release/hachip_console-linux
      - name: Rename binary for release (macOS)
        if: runner.os == 'macOS'
        run: mv target/release/hachip_console target/release/hachip_console-macos
      - name: Rename binary for release (Windows)
        if: runner.os == 'Windows'
        run: mv target/release/hachip_console.exe target/release/hachip_console-windows.exe
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          files: |
            target/release/hachip_console-linux
            target/release/hachip_console-macos
            target/release/hachip_console-windows.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
